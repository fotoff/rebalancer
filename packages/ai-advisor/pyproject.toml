[project]
name = "ai-advisor"
version = "0.1.0"
description = "AI Advisor for Token Rebalancer — signals, policy, explanations"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.34.0",
    "pydantic>=2.10.0",
    "pydantic-settings>=2.7.0",
    "httpx>=0.28.0",
    "numpy>=2.2.0",
    "pandas>=2.2.0",
    "python-jose[cryptography]>=3.3.0",
    "openai>=1.60.0",
    "jsonschema>=4.23.0",
    "cachetools>=5.5.0",
    "structlog>=24.4.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.25.0",
    "pytest-httpx>=0.35.0",
    "ruff>=0.9.0",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
